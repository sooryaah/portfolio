<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="userGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.1" />
    </radialGradient>
  </defs>
  
  <rect width="400" height="300" fill="url(#bgGradient3)"/>
  
  <!-- Connection lines -->
  <line x1="100" y1="100" x2="200" y2="150" stroke="#60a5fa" stroke-width="2" opacity="0.4"/>
  <line x1="300" y1="100" x2="200" y2="150" stroke="#60a5fa" stroke-width="2" opacity="0.4"/>
  <line x1="100" y1="220" x2="200" y2="150" stroke="#60a5fa" stroke-width="2" opacity="0.4"/>
  <line x1="300" y1="220" x2="200" y2="150" stroke="#60a5fa" stroke-width="2" opacity="0.4"/>
  <line x1="100" y1="100" x2="100" y2="220" stroke="#3b82f6" stroke-width="1.5" opacity="0.3"/>
  <line x1="300" y1="100" x2="300" y2="220" stroke="#3b82f6" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Center user (larger) -->
  <circle cx="200" cy="150" r="20" fill="#60a5fa"/>
  <circle cx="200" cy="150" r="28" fill="url(#userGlow)" opacity="0.5"/>
  <!-- Head -->
  <circle cx="200" cy="140" r="8" fill="#ffffff" opacity="0.9"/>
  <!-- Body -->
  <ellipse cx="200" cy="155" rx="7" ry="10" fill="#ffffff" opacity="0.9"/>
  
  <!-- Top left user -->
  <circle cx="100" cy="100" r="16" fill="#3b82f6"/>
  <circle cx="100" cy="100" r="22" fill="url(#userGlow)" opacity="0.4"/>
  <circle cx="100" cy="92" r="6" fill="#ffffff" opacity="0.8"/>
  <ellipse cx="100" cy="104" rx="5" ry="8" fill="#ffffff" opacity="0.8"/>
  
  <!-- Top right user -->
  <circle cx="300" cy="100" r="16" fill="#3b82f6"/>
  <circle cx="300" cy="100" r="22" fill="url(#userGlow)" opacity="0.4"/>
  <circle cx="300" cy="92" r="6" fill="#ffffff" opacity="0.8"/>
  <ellipse cx="300" cy="104" rx="5" ry="8" fill="#ffffff" opacity="0.8"/>
  
  <!-- Bottom left user -->
  <circle cx="100" cy="220" r="16" fill="#3b82f6"/>
  <circle cx="100" cy="220" r="22" fill="url(#userGlow)" opacity="0.4"/>
  <circle cx="100" cy="212" r="6" fill="#ffffff" opacity="0.8"/>
  <ellipse cx="100" cy="224" rx="5" ry="8" fill="#ffffff" opacity="0.8"/>
  
  <!-- Bottom right user -->
  <circle cx="300" cy="220" r="16" fill="#3b82f6"/>
  <circle cx="300" cy="220" r="22" fill="url(#userGlow)" opacity="0.4"/>
  <circle cx="300" cy="212" r="6" fill="#ffffff" opacity="0.8"/>
  <ellipse cx="300" cy="224" rx="5" ry="8" fill="#ffffff" opacity="0.8"/>
  
  <!-- Additional connection points -->
  <circle cx="80" cy="150" r="5" fill="#60a5fa" opacity="0.6"/>
  <circle cx="320" cy="150" r="5" fill="#60a5fa" opacity="0.6"/>
  <circle cx="200" cy="70" r="5" fill="#60a5fa" opacity="0.6"/>
  <circle cx="200" cy="230" r="5" fill="#60a5fa" opacity="0.6"/>
  
  <!-- Label -->
  <text x="200" y="270" font-family="Poppins, sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle" opacity="0.8">Team Network</text>
</svg>