<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#080c1c"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bgGrad)"/>

  <!-- Shopping bag -->
  <g transform="translate(220,90)">
    <rect x="0" y="40" width="160" height="140" rx="14" fill="url(#cardGrad)" stroke="#38bdf8" stroke-opacity="0.4" stroke-width="2"/>
    <path d="M40 40 V20 a40 40 0 0 1 80 0 V40" fill="none" stroke="#38bdf8" stroke-width="6" stroke-linecap="round"/>
    <circle cx="50" cy="90" r="6" fill="#fbbf24"/>
    <circle cx="110" cy="90" r="6" fill="#fbbf24"/>
    <rect x="30" y="120" width="100" height="10" rx="5" fill="#38bdf8" fill-opacity="0.5"/>
    <rect x="30" y="140" width="60" height="10" rx="5" fill="#38bdf8" fill-opacity="0.3"/>
  </g>

  <!-- Cart icon -->
  <g transform="translate(110,230)">
    <circle cx="20" cy="70" r="10" fill="#fb923c"/>
    <circle cx="80" cy="70" r="10" fill="#fb923c"/>
    <path d="M0 0 H20 L35 60 H85 L100 15 H30" fill="none" stroke="#fbbf24" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
  </g>

  <!-- Price tag -->
  <g transform="translate(380,250)">
    <path d="M0 20 L40 0 L80 20 L80 60 Q80 70 70 70 L10 70 Q0 70 0 60 Z" fill="url(#cardGrad)" stroke="#38bdf8" stroke-opacity="0.4" stroke-width="2"/>
    <circle cx="40" cy="35" r="8" fill="url(#btnGrad)"/>
  </g>

  <!-- floating dots -->
  <circle cx="80" cy="80" r="4" fill="#38bdf8" opacity="0.6"/>
  <circle cx="520" cy="100" r="5" fill="#fbbf24" opacity="0.6"/>
  <circle cx="500" cy="320" r="4" fill="#38bdf8" opacity="0.5"/>
  <circle cx="60" cy="330" r="3" fill="#fb923c" opacity="0.6"/>
</svg>
