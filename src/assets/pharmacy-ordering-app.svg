<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#080c1c"/>
    </linearGradient>
    <linearGradient id="cardGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bgGrad2)"/>

  <!-- Phone frame -->
  <g transform="translate(230,60)">
    <rect x="0" y="0" width="140" height="260" rx="22" fill="url(#cardGrad2)" stroke="#38bdf8" stroke-opacity="0.4" stroke-width="2"/>
    <rect x="14" y="20" width="112" height="180" rx="8" fill="#0c1228" stroke="#38bdf8" stroke-opacity="0.25" stroke-width="1.5"/>
    <circle cx="70" cy="232" r="10" fill="none" stroke="#38bdf8" stroke-width="2"/>

    <!-- medical cross inside phone -->
    <g transform="translate(50,60)">
      <rect x="14" y="0" width="12" height="40" rx="3" fill="#fbbf24"/>
      <rect x="0" y="14" width="40" height="12" rx="3" fill="#fbbf24"/>
    </g>

    <!-- bars representing list/order -->
    <rect x="26" y="120" width="88" height="8" rx="4" fill="#38bdf8" fill-opacity="0.5"/>
    <rect x="26" y="138" width="64" height="8" rx="4" fill="#38bdf8" fill-opacity="0.35"/>
    <rect x="26" y="156" width="76" height="8" rx="4" fill="#38bdf8" fill-opacity="0.35"/>
  </g>

  <!-- pill capsule left -->
  <g transform="translate(90,150) rotate(-20)">
    <rect x="0" y="0" width="70" height="28" rx="14" fill="#fb923c" fill-opacity="0.85"/>
    <rect x="0" y="0" width="35" height="28" rx="14" fill="#fbbf24"/>
  </g>

  <!-- pill capsule right -->
  <g transform="translate(430,230) rotate(15)">
    <rect x="0" y="0" width="60" height="24" rx="12" fill="#38bdf8" fill-opacity="0.7"/>
    <rect x="0" y="0" width="30" height="24" rx="12" fill="#fbbf24" fill-opacity="0.9"/>
  </g>

  <!-- truck / dispatch icon -->
  <g transform="translate(400,90)">
    <rect x="0" y="20" width="60" height="30" rx="4" fill="url(#cardGrad2)" stroke="#38bdf8" stroke-opacity="0.4" stroke-width="2"/>
    <rect x="60" y="28" width="22" height="22" rx="3" fill="url(#cardGrad2)" stroke="#38bdf8" stroke-opacity="0.4" stroke-width="2"/>
    <circle cx="16" cy="54" r="6" fill="#fbbf24"/>
    <circle cx="68" cy="54" r="6" fill="#fbbf24"/>
  </g>

  <circle cx="70" cy="80" r="4" fill="#38bdf8" opacity="0.6"/>
  <circle cx="520" cy="330" r="4" fill="#fb923c" opacity="0.6"/>
  <circle cx="500" cy="60" r="3" fill="#fbbf24" opacity="0.5"/>
</svg>
