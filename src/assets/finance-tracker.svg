<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a1f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14532d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chartGradient1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="chartGradient2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="chartGradient3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="url(#bgGradient2)"/>
  
  <!-- Grid lines -->
  <line x1="30" y1="40" x2="30" y2="240" stroke="#34d399" stroke-width="1" opacity="0.2"/>
  <line x1="370" y1="40" x2="370" y2="240" stroke="#34d399" stroke-width="1" opacity="0.2"/>
  <line x1="30" y1="240" x2="370" y2="240" stroke="#34d399" stroke-width="1" opacity="0.2"/>
  
  <!-- Horizontal guide lines -->
  <line x1="30" y1="80" x2="370" y2="80" stroke="#34d399" stroke-width="0.5" opacity="0.15"/>
  <line x1="30" y1="140" x2="370" y2="140" stroke="#34d399" stroke-width="0.5" opacity="0.15"/>
  <line x1="30" y1="190" x2="370" y2="190" stroke="#34d399" stroke-width="0.5" opacity="0.15"/>
  
  <!-- Chart bars 1 -->
  <rect x="50" y="160" width="30" height="80" fill="url(#chartGradient1)"/>
  <rect x="90" y="120" width="30" height="120" fill="url(#chartGradient1)"/>
  <rect x="130" y="100" width="30" height="140" fill="url(#chartGradient1)"/>
  
  <!-- Chart bars 2 -->
  <rect x="170" y="140" width="30" height="100" fill="url(#chartGradient2)"/>
  <rect x="210" y="100" width="30" height="140" fill="url(#chartGradient2)"/>
  <rect x="250" y="120" width="30" height="120" fill="url(#chartGradient2)"/>
  
  <!-- Chart bars 3 -->
  <rect x="290" y="130" width="30" height="110" fill="url(#chartGradient3)"/>
  <rect x="330" y="110" width="30" height="130" fill="url(#chartGradient3)"/>
  
  <!-- Trend line -->
  <polyline points="65,160 105,120 145,100 185,140 225,100 265,120 305,130 345,110" stroke="#34d399" stroke-width="2" fill="none" opacity="0.8"/>
  
  <!-- Data points on trend -->
  <circle cx="65" cy="160" r="4" fill="#34d399"/>
  <circle cx="105" cy="120" r="4" fill="#34d399"/>
  <circle cx="145" cy="100" r="4" fill="#34d399"/>
  <circle cx="185" cy="140" r="4" fill="#34d399"/>
  <circle cx="225" cy="100" r="4" fill="#34d399"/>
  <circle cx="265" cy="120" r="4" fill="#34d399"/>
  <circle cx="305" cy="130" r="4" fill="#34d399"/>
  <circle cx="345" cy="110" r="4" fill="#34d399"/>
  
  <!-- Labels -->
  <text x="200" y="270" font-family="Poppins, sans-serif" font-size="12" fill="#34d399" text-anchor="middle" opacity="0.8">Financial Analytics</text>
</svg>